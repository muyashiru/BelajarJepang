<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Katakana - Nasywa Goes To Japan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .japanese-char { font-size: 52px; font-weight: normal; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.3s; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
    <!-- Navbar -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-14">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center">
                        <span class="text-white font-bold text-lg">B</span>
                    </div>
                    <a href="index.html" class="text-xl font-bold text-gray-900 dark:text-white">Nasywa Goes To Japan</a>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleDarkMode()" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" title="Toggle Dark Mode">
                        <svg class="w-5 h-5 text-gray-800 dark:text-yellow-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path class="dark:hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                            <path class="hidden dark:block" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </button>
                    <button onclick="window.location='index.html'" class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white">
                    ✕ Keluar
                </button>
            </div>
        </div>
    </nav>

    <!-- Progress Bar -->
    <div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 transition-colors duration-300">
        <div class="max-w-3xl mx-auto px-4 py-2">
            <div class="flex items-center justify-between mb-1">
                <span class="text-xs font-semibold text-gray-600 dark:text-gray-300">Soal <span id="current-question">1</span>/<span id="total-questions">10</span></span>
                <span class="text-xs font-semibold" id="progress-percent">10%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-1.5">
                <div id="progress-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-300" style="width: 10%"></div>
            </div>
        </div>
    </div>

    <!-- Quiz Container -->
    <div class="max-w-3xl mx-auto px-4 py-1">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-3 transition-colors duration-300">
            <!-- Character Display -->
            <div class="text-center mb-3">
                <div class="bg-gradient-to-br from-blue-50 to-indigo-50 dark:from-blue-900/30 dark:to-indigo-900/30 rounded-2xl p-4 mb-2">
                    <div class="japanese-char dark:text-white" id="question-char">ア</div>
                    <button onclick="playSound()" class="mt-1 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300">
                        <svg class="w-5 h-5 mx-auto" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/>
                        </svg>
                    </button>
                </div>
                <p class="text-sm text-gray-700 dark:text-gray-200 font-semibold">Pilih bacaan yang benar</p>
            </div>

            <!-- Answer Options -->
            <div id="options-container" class="space-y-1.5">
                <!-- Options will be generated by JavaScript -->
            </div>

            <!-- Next Button (hidden initially) -->
            <div id="next-container" class="mt-3 hidden">
                <button onclick="nextQuestion()" class="w-full bg-gray-700 hover:bg-gray-800 text-white font-bold py-2 px-6 rounded-xl text-sm transition duration-200 flex items-center justify-center">
                    Lanjut
                    <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Skip Button -->
        <div class="text-center mt-2">
            <button onclick="skipQuestion()" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 text-xs">
                Lewati Soal
            </button>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="result-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-2xl p-8 max-w-md w-full text-center transition-colors duration-300">
            <div class="text-6xl mb-4" id="result-emoji">🎉</div>
            <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Selesai!</h2>
            <p class="text-gray-600 dark:text-gray-300 mb-4">Skor Anda:</p>
            <div class="text-5xl font-bold text-blue-500 mb-6">
                <span id="final-score">0</span>/<span id="final-total">10</span>
            </div>
            <div class="mb-6">
                <div class="text-2xl font-bold text-gray-900 dark:text-white" id="percentage">0%</div>
                <p class="text-gray-600 dark:text-gray-300 mt-2" id="result-message">Terus berlatih!</p>
            </div>
            <div class="space-y-3">
                <button onclick="restartQuiz()" class="w-full bg-blue-500 hover:bg-blue-600 dark:bg-blue-600 dark:hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl">
                    Ulangi Latihan
                </button>
                <button onclick="window.location='index.html'" class="w-full bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-bold py-4 px-6 rounded-xl">
                    Kembali ke Beranda
                </button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let currentQuestionIndex = 0;
        let score = 0;
        let questions = [];
        const totalQuestions = 10;

        // Initialize quiz
        function initQuiz() {
            // Shuffle and select random katakana
            const shuffled = [...katakanaData].sort(() => Math.random() - 0.5);
            questions = shuffled.slice(0, totalQuestions);
            currentQuestionIndex = 0;
            score = 0;
            
            document.getElementById('total-questions').textContent = totalQuestions;
            loadQuestion();
        }

        // Load current question
        function loadQuestion() {
            if (currentQuestionIndex >= totalQuestions) {
                showResults();
                return;
            }

            const question = questions[currentQuestionIndex];
            document.getElementById('question-char').textContent = question.char;
            document.getElementById('current-question').textContent = currentQuestionIndex + 1;
            
            const progress = ((currentQuestionIndex + 1) / totalQuestions) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('progress-percent').textContent = Math.round(progress) + '%';

            // Generate options
            generateOptions(question);

            // Hide next button
            document.getElementById('next-container').classList.add('hidden');
        }

        // Generate answer options
        function generateOptions(correctQuestion) {
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            // Get 3 random wrong answers
            const wrongOptions = katakanaData
                .filter(k => k.romaji !== correctQuestion.romaji)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3);

            // Combine and shuffle
            const allOptions = [correctQuestion, ...wrongOptions]
                .sort(() => Math.random() - 0.5);

            // Create option buttons
            allOptions.forEach(option => {
                const button = document.createElement('button');
                button.className = 'w-full bg-white dark:bg-gray-700 border-2 border-gray-200 dark:border-gray-600 hover:border-blue-300 dark:hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-xl py-2 px-4 text-left transition duration-200 option-btn';
                button.innerHTML = `<span class="text-sm font-semibold text-gray-900 dark:text-white">${option.romaji}</span>`;
                button.onclick = () => checkAnswer(option.romaji, correctQuestion.romaji, button);
                optionsContainer.appendChild(button);
            });
        }

        // Check answer
        function checkAnswer(selected, correct, button) {
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(btn => btn.disabled = true);

            if (selected === correct) {
                button.classList.remove('border-gray-200', 'hover:border-blue-300', 'hover:bg-blue-50');
                button.classList.add('border-green-500', 'bg-green-50');
                button.innerHTML += ' <span class="float-right text-green-500">✓</span>';
                score++;
                
                // Play correct answer sound
                const correctSound = new Audio('benar.aac');
                correctSound.play().catch(e => console.log('Audio play failed:', e));
            } else {
                button.classList.remove('border-gray-200', 'hover:border-blue-300', 'hover:bg-blue-50');
                button.classList.add('border-red-500', 'bg-red-50', 'shake');
                button.innerHTML += ' <span class="float-right text-red-500">✕</span>';
                
                // Play wrong answer sound
                const wrongSound = new Audio('salah.aac');
                wrongSound.play().catch(e => console.log('Audio play failed:', e));

                // Highlight correct answer
                allButtons.forEach(btn => {
                    if (btn.textContent.includes(correct)) {
                        btn.classList.remove('border-gray-200');
                        btn.classList.add('border-green-500', 'bg-green-50');
                        btn.innerHTML += ' <span class="float-right text-green-500">✓</span>';
                    }
                });
            }

            // Show next button
            document.getElementById('next-container').classList.remove('hidden');
        }

        // Next question
        function nextQuestion() {
            currentQuestionIndex++;
            loadQuestion();
        }

        // Skip question
        function skipQuestion() {
            nextQuestion();
        }

        // Show results
        function showResults() {
            const percentage = Math.round((score / totalQuestions) * 100);
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-total').textContent = totalQuestions;
            document.getElementById('percentage').textContent = percentage + '%';

            let emoji = '🎉';
            let message = 'Luar biasa!';

            if (percentage === 100) {
                emoji = '🏆';
                message = 'Sempurna! Kamu hebat!';
            } else if (percentage >= 80) {
                emoji = '🎉';
                message = 'Bagus sekali!';
            } else if (percentage >= 60) {
                emoji = '👍';
                message = 'Lumayan, terus berlatih!';
            } else {
                emoji = '💪';
                message = 'Jangan menyerah, coba lagi!';
            }

            document.getElementById('result-emoji').textContent = emoji;
            document.getElementById('result-message').textContent = message;
            document.getElementById('result-modal').classList.remove('hidden');
        }

        // Restart quiz
        function restartQuiz() {
            document.getElementById('result-modal').classList.add('hidden');
            initQuiz();
        }

        // Play sound (placeholder)
        function playSound() {
            console.log('Playing sound for:', document.getElementById('question-char').textContent);
        }

        // Start quiz on page load
        initQuiz();
    </script>
    <script src="darkmode.js"></script>
</body>
</html>
