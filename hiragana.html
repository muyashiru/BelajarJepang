    <script src="data.js"></script>
    <script>
        let currentQuestionIndex = 0;
        let score = 0;
        let questions = [];
        const totalQuestions = 10;

        // Initialize quiz
        function initQuiz() {
            // Shuffle and select random hiragana
            const shuffled = [...hiraganaData].sort(() => Math.random() - 0.5);
            questions = shuffled.slice(0, totalQuestions);
            currentQuestionIndex = 0;
            score = 0;
            
            document.getElementById('total-questions').textContent = totalQuestions;
            loadQuestion();
        }

        // Load current question
        function loadQuestion() {
            if (currentQuestionIndex >= totalQuestions) {
                showResults();
                return;
            }

            const question = questions[currentQuestionIndex];
            document.getElementById('question-char').textContent = question.char;
            document.getElementById('current-question').textContent = currentQuestionIndex + 1;
            
            const progress = ((currentQuestionIndex + 1) / totalQuestions) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('progress-percent').textContent = Math.round(progress) + '%';

            // Generate options
            generateOptions(question);

            // Hide next button
            document.getElementById('next-container').classList.add('hidden');
        }

        // Generate answer options
        function generateOptions(correctQuestion) {
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            // Get 3 random wrong answers
            const wrongOptions = hiraganaData
                .filter(h => h.romaji !== correctQuestion.romaji)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3);

            // Combine and shuffle
            const allOptions = [correctQuestion, ...wrongOptions]
                .sort(() => Math.random() - 0.5);

            // Create option buttons
            allOptions.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn bg-white dark:bg-gray-700 border-2 border-gray-300 dark:border-gray-600 hover:border-gray-400 dark:hover:border-gray-500 rounded-xl transition duration-200';
                button.innerHTML = `<span class="text-lg font-semibold text-gray-900 dark:text-white">${option.romaji}</span>`;
                button.onclick = () => checkAnswer(option.romaji, correctQuestion.romaji, button);
                optionsContainer.appendChild(button);
            });
        }

        // Check answer
        function checkAnswer(selected, correct, button) {
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(btn => btn.disabled = true);

            if (selected === correct) {
                button.classList.remove('border-gray-300', 'dark:border-gray-600', 'hover:border-gray-400');
                button.classList.add('border-green-500', 'bg-green-50', 'dark:bg-green-900/30');
                const indicator = document.createElement('span');
                indicator.className = 'option-indicator text-green-500';
                indicator.textContent = '✓';
                button.appendChild(indicator);
                score++;
                
                // Play correct answer sound
                const correctSound = new Audio('benar.aac');
                correctSound.play().catch(e => console.log('Audio play failed:', e));
            } else {
                button.classList.remove('border-gray-300', 'dark:border-gray-600', 'hover:border-gray-400');
                button.classList.add('border-red-500', 'bg-red-50', 'dark:bg-red-900/30', 'shake');
                const indicator = document.createElement('span');
                indicator.className = 'option-indicator text-red-500';
                indicator.textContent = '✕';
                button.appendChild(indicator);
                
                // Play wrong answer sound
                const wrongSound = new Audio('salah.aac');
                wrongSound.play().catch(e => console.log('Audio play failed:', e));

                // Highlight correct answer
                allButtons.forEach(btn => {
                    const btnText = btn.querySelector('span').textContent;
                    if (btnText === correct) {
                        btn.classList.remove('border-gray-300', 'dark:border-gray-600');
                        btn.classList.add('border-green-500', 'bg-green-50', 'dark:bg-green-900/30');
                        const correctIndicator = document.createElement('span');
                        correctIndicator.className = 'option-indicator text-green-500';
                        correctIndicator.textContent = '✓';
                        btn.appendChild(correctIndicator);
                    }
                });
            }

            // Show next button
            document.getElementById('next-container').classList.remove('hidden');
        }

        // Next question
        function nextQuestion() {
            currentQuestionIndex++;
            loadQuestion();
        }

        // Skip question
        function skipQuestion() {
            nextQuestion();
        }

        // Show results
        function showResults() {
            const percentage = Math.round((score / totalQuestions) * 100);
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-total').textContent = totalQuestions;
            document.getElementById('percentage').textContent = percentage + '%';

            let emoji = '🎉';
            let message = 'Luar biasa!';

            if (percentage === 100) {
                emoji = '🏆';
                message = 'Sempurna! Kamu hebat!';
            } else if (percentage >= 80) {
                emoji = '🎉';
                message = 'Bagus sekali!';
            } else if (percentage >= 60) {
                emoji = '👍';
                message = 'Lumayan, terus berlatih!';
            } else {
                emoji = '💪';
                message = 'Jangan menyerah, coba lagi!';
            }

            document.getElementById('result-emoji').textContent = emoji;
            document.getElementById('result-message').textContent = message;
            document.getElementById('result-modal').classList.remove('hidden');
        }

        // Restart quiz
        function restartQuiz() {
            document.getElementById('result-modal').classList.add('hidden');
            initQuiz();
        }

        // Play sound (placeholder)
        function playSound() {
            // In a real app, this would play audio pronunciation
            console.log('Playing sound for:', document.getElementById('question-char').textContent);
        }

        // Mobile menu toggle
        function toggleMobileMenu() {
            const mobileMenu = document.getElementById('mobileMenu');
            mobileMenu.classList.toggle('hidden');
        }

        // Start quiz on page load
        initQuiz();
    </script>
