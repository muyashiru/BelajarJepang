<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Kanji - Nasywa Goes To Japan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .japanese-char { font-size: 100px; font-weight: normal; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.3s; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center">
                        <span class="text-white font-bold text-lg">B</span>
                    </div>
                    <a href="index.html" class="text-xl font-bold text-gray-900">Nasywa Goes To Japan</a>
                </div>
                <button onclick="window.location='index.html'" class="text-gray-600 hover:text-gray-900">
                    ✕ Keluar
                </button>
            </div>
        </div>
    </nav>

    <!-- Level Selection (shown initially) -->
    <div id="level-selection" class="max-w-4xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-gray-900 mb-4">Pilih Level Kanji</h1>
            <p class="text-xl text-gray-600">Mulai dari level yang sesuai dengan kemampuanmu</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- N5 Level -->
            <button onclick="startQuiz('N5')" class="bg-gradient-to-br from-orange-400 to-orange-500 hover:from-orange-500 hover:to-orange-600 text-white rounded-2xl p-8 text-left transition duration-200 shadow-lg">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-sm font-bold bg-white bg-opacity-30 px-3 py-1 rounded-full">PEMULA</span>
                    <span class="text-4xl">🌟</span>
                </div>
                <h3 class="text-3xl font-bold mb-2">Kanji N5</h3>
                <p class="text-orange-100 mb-4">103 kanji dasar untuk pemula</p>
                <div class="flex items-center space-x-4 text-sm">
                    <span class="bg-white bg-opacity-20 px-3 py-1 rounded-full">Level JLPT N5</span>
                </div>
            </button>

            <!-- N4 Level -->
            <button onclick="startQuiz('N4')" class="bg-gradient-to-br from-blue-400 to-blue-500 hover:from-blue-500 hover:to-blue-600 text-white rounded-2xl p-8 text-left transition duration-200 shadow-lg">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-sm font-bold bg-white bg-opacity-30 px-3 py-1 rounded-full">MENENGAH</span>
                    <span class="text-4xl">🎯</span>
                </div>
                <h3 class="text-3xl font-bold mb-2">Kanji N4</h3>
                <p class="text-blue-100 mb-4">168 kanji untuk level menengah</p>
                <div class="flex items-center space-x-4 text-sm">
                    <span class="bg-white bg-opacity-20 px-3 py-1 rounded-full">Level JLPT N4</span>
                </div>
            </button>

            <!-- Mixed Level -->
            <button onclick="startQuiz('MIXED')" class="bg-gradient-to-br from-purple-400 to-purple-500 hover:from-purple-500 hover:to-purple-600 text-white rounded-2xl p-8 text-left transition duration-200 shadow-lg md:col-span-2">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-sm font-bold bg-white bg-opacity-30 px-3 py-1 rounded-full">TANTANGAN</span>
                    <span class="text-4xl">🔥</span>
                </div>
                <h3 class="text-3xl font-bold mb-2">Campuran N5 & N4</h3>
                <p class="text-purple-100 mb-4">Kombinasi random dari 271 kanji N5 dan N4</p>
                <div class="flex items-center space-x-4 text-sm">
                    <span class="bg-white bg-opacity-20 px-3 py-1 rounded-full">Semua Level</span>
                </div>
            </button>
        </div>
    </div>

    <!-- Progress Bar (hidden initially) -->
    <div id="progress-section" class="hidden bg-white border-b">
        <div class="max-w-3xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-semibold text-gray-600">Soal <span id="current-question">1</span>/<span id="total-questions">15</span></span>
                <span class="text-sm font-semibold" id="progress-percent">7%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3">
                <div id="progress-bar" class="bg-orange-500 h-3 rounded-full transition-all duration-300" style="width: 7%"></div>
            </div>
        </div>
    </div>

    <!-- Quiz Container (hidden initially) -->
    <div id="quiz-container" class="hidden max-w-3xl mx-auto px-4 py-12">
        <div class="bg-white rounded-3xl shadow-lg p-8 md:p-12">
            <!-- Character Display -->
            <div class="text-center mb-8">
                <div class="bg-gradient-to-br from-orange-50 to-yellow-50 rounded-3xl p-8 mb-4">
                    <div class="japanese-char mb-2" id="question-char">日</div>
                    <div class="text-sm text-gray-500" id="question-hint">
                        <!-- Hint will be shown here -->
                    </div>
                </div>
                <p class="text-xl text-gray-700 font-semibold" id="question-text">Pilih arti yang benar</p>
            </div>

            <!-- Answer Options -->
            <div id="options-container" class="space-y-4">
                <!-- Options will be generated by JavaScript -->
            </div>

            <!-- Next Button (hidden initially) -->
            <div id="next-container" class="mt-8 hidden">
                <button onclick="nextQuestion()" class="w-full bg-gray-700 hover:bg-gray-800 text-white font-bold py-4 px-6 rounded-xl text-lg transition duration-200 flex items-center justify-center">
                    Lanjut
                    <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Back Button -->
        <div class="text-center mt-6">
            <button onclick="backToLevelSelection()" class="text-gray-500 hover:text-gray-700 font-semibold">
                ← Kembali Pilih Level
            </button>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="result-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center">
            <div class="text-6xl mb-4" id="result-emoji">🎉</div>
            <h2 class="text-3xl font-bold text-gray-900 mb-2">Selesai!</h2>
            <div class="inline-block bg-orange-100 px-4 py-2 rounded-full mb-4">
                <span class="text-sm font-bold text-orange-600" id="result-level">Level N5</span>
            </div>
            <p class="text-gray-600 mb-4">Skor Anda:</p>
            <div class="text-5xl font-bold text-orange-500 mb-6">
                <span id="final-score">0</span>/<span id="final-total">15</span>
            </div>
            <div class="mb-6">
                <div class="text-2xl font-bold text-gray-900" id="percentage">0%</div>
                <p class="text-gray-600 mt-2" id="result-message">Terus berlatih!</p>
            </div>
            <div class="space-y-3">
                <button onclick="restartQuiz()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 px-6 rounded-xl">
                    Ulangi Latihan
                </button>
                <button onclick="backToLevelSelection()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-4 px-6 rounded-xl">
                    Pilih Level Lain
                </button>
                <button onclick="window.location='index.html'" class="w-full bg-white border-2 border-gray-200 hover:bg-gray-50 text-gray-700 font-bold py-4 px-6 rounded-xl">
                    Kembali ke Beranda
                </button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let currentQuestionIndex = 0;
        let score = 0;
        let questions = [];
        let currentLevel = 'N5';
        const totalQuestions = 15;
        const questionTypes = ['arti', 'onyomi', 'kunyomi'];

        // Start quiz with selected level
        function startQuiz(level) {
            currentLevel = level;
            
            // Hide level selection
            document.getElementById('level-selection').classList.add('hidden');
            
            // Show quiz
            document.getElementById('progress-section').classList.remove('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            
            // Initialize quiz
            initQuiz();
        }

        // Initialize quiz
        function initQuiz() {
            let kanjiPool = [];
            
            if (currentLevel === 'N5') {
                kanjiPool = [...kanjiN5Data];
            } else if (currentLevel === 'N4') {
                kanjiPool = [...kanjiN4Data];
            } else {
                kanjiPool = [...kanjiN5Data, ...kanjiN4Data];
            }
            
            // Shuffle and select random kanji
            const shuffled = kanjiPool.sort(() => Math.random() - 0.5);
            questions = shuffled.slice(0, totalQuestions);
            currentQuestionIndex = 0;
            score = 0;
            
            document.getElementById('total-questions').textContent = totalQuestions;
            loadQuestion();
        }

        // Load current question
        function loadQuestion() {
            if (currentQuestionIndex >= totalQuestions) {
                showResults();
                return;
            }

            const question = questions[currentQuestionIndex];
            const questionType = questionTypes[Math.floor(Math.random() * questionTypes.length)];
            
            document.getElementById('question-char').textContent = question.char;
            document.getElementById('current-question').textContent = currentQuestionIndex + 1;
            
            const progress = ((currentQuestionIndex + 1) / totalQuestions) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('progress-percent').textContent = Math.round(progress) + '%';

            // Set question based on type
            let questionText = '';
            let correctAnswer = '';
            let hint = '';
            
            if (questionType === 'arti') {
                questionText = 'Pilih arti yang benar';
                correctAnswer = question.arti;
                hint = `Contoh: ${question.contoh}`;
            } else if (questionType === 'onyomi') {
                questionText = 'Pilih On-yomi (bacaan China)';
                correctAnswer = question.onyomi.split('、')[0];
                hint = `Arti: ${question.arti}`;
            } else {
                questionText = 'Pilih Kun-yomi (bacaan Jepang)';
                correctAnswer = question.kunyomi.split('、')[0];
                hint = `Arti: ${question.arti}`;
            }
            
            document.getElementById('question-text').textContent = questionText;
            document.getElementById('question-hint').textContent = hint;

            // Generate options
            generateOptions(question, questionType, correctAnswer);

            // Hide next button
            document.getElementById('next-container').classList.add('hidden');
        }

        // Generate answer options
        function generateOptions(correctQuestion, questionType, correctAnswer) {
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            let allKanji = currentLevel === 'N5' ? kanjiN5Data : 
                          currentLevel === 'N4' ? kanjiN4Data : 
                          [...kanjiN5Data, ...kanjiN4Data];

            // Get 3 random wrong answers
            let wrongOptions = [];
            if (questionType === 'arti') {
                wrongOptions = allKanji
                    .filter(k => k.arti !== correctQuestion.arti)
                    .sort(() => Math.random() - 0.5)
                    .slice(0, 3)
                    .map(k => k.arti);
            } else if (questionType === 'onyomi') {
                wrongOptions = allKanji
                    .filter(k => k.onyomi !== correctQuestion.onyomi)
                    .sort(() => Math.random() - 0.5)
                    .slice(0, 3)
                    .map(k => k.onyomi.split('、')[0]);
            } else {
                wrongOptions = allKanji
                    .filter(k => k.kunyomi !== correctQuestion.kunyomi && k.kunyomi !== '')
                    .sort(() => Math.random() - 0.5)
                    .slice(0, 3)
                    .map(k => k.kunyomi.split('、')[0]);
            }

            // Combine and shuffle
            const allOptions = [correctAnswer, ...wrongOptions]
                .sort(() => Math.random() - 0.5);

            // Create option buttons
            allOptions.forEach(option => {
                const button = document.createElement('button');
                button.className = 'w-full bg-white border-2 border-gray-200 hover:border-orange-300 hover:bg-orange-50 rounded-xl py-4 px-6 text-left transition duration-200 option-btn';
                button.innerHTML = `<span class="text-xl font-semibold text-gray-900">${option}</span>`;
                button.onclick = () => checkAnswer(option, correctAnswer, button);
                optionsContainer.appendChild(button);
            });
        }

        // Check answer
        function checkAnswer(selected, correct, button) {
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(btn => btn.disabled = true);

            if (selected === correct) {
                button.classList.remove('border-gray-200', 'hover:border-orange-300', 'hover:bg-orange-50');
                button.classList.add('border-green-500', 'bg-green-50');
                button.innerHTML += ' <span class="float-right text-green-500">✓</span>';
                score++;
            } else {
                button.classList.remove('border-gray-200', 'hover:border-orange-300', 'hover:bg-orange-50');
                button.classList.add('border-red-500', 'bg-red-50', 'shake');
                button.innerHTML += ' <span class="float-right text-red-500">✕</span>';

                // Highlight correct answer
                allButtons.forEach(btn => {
                    if (btn.textContent.includes(correct)) {
                        btn.classList.remove('border-gray-200');
                        btn.classList.add('border-green-500', 'bg-green-50');
                        btn.innerHTML += ' <span class="float-right text-green-500">✓</span>';
                    }
                });
            }

            // Show next button
            document.getElementById('next-container').classList.remove('hidden');
        }

        // Next question
        function nextQuestion() {
            currentQuestionIndex++;
            loadQuestion();
        }

        // Show results
        function showResults() {
            const percentage = Math.round((score / totalQuestions) * 100);
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-total').textContent = totalQuestions;
            document.getElementById('percentage').textContent = percentage + '%';
            document.getElementById('result-level').textContent = 'Level ' + currentLevel;

            let emoji = '🎉';
            let message = 'Luar biasa!';

            if (percentage === 100) {
                emoji = '🏆';
                message = 'Sempurna! Kamu master kanji!';
            } else if (percentage >= 80) {
                emoji = '🎉';
                message = 'Bagus sekali! Hampir sempurna!';
            } else if (percentage >= 60) {
                emoji = '👍';
                message = 'Lumayan, terus berlatih ya!';
            } else {
                emoji = '💪';
                message = 'Jangan menyerah! Coba lagi!';
            }

            document.getElementById('result-emoji').textContent = emoji;
            document.getElementById('result-message').textContent = message;
            document.getElementById('result-modal').classList.remove('hidden');
        }

        // Restart quiz
        function restartQuiz() {
            document.getElementById('result-modal').classList.add('hidden');
            initQuiz();
        }

        // Back to level selection
        function backToLevelSelection() {
            document.getElementById('result-modal').classList.add('hidden');
            document.getElementById('progress-section').classList.add('hidden');
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('level-selection').classList.remove('hidden');
        }
    </script>
</body>
</html>
